<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>AlphaEqt vs KaTeX (default font)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.katex,.katex *{font-size:50px!important}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;margin:16px}
h1{color:#e94560;text-align:center;font-size:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:1200px;margin:0 auto}
.card{background:#16213e;border-radius:6px;padding:8px}
.card h3{color:#0f3460;background:#e94560;display:inline-block;padding:2px 8px;border-radius:4px;margin:0 0 6px 0;font-size:12px}
.row{display:flex;gap:8px;align-items:flex-start}
.col{flex:1;min-width:0}
.col-label{font-size:10px;color:#888;margin-bottom:4px}
.card img{max-width:100%;height:auto;background:#fff;border-radius:4px;padding:6px}
.kt{background:#fff;border-radius:4px;padding:6px;min-height:20px;color:#000}
.code{font-family:monospace;font-size:10px;color:#aaa;margin-top:4px;word-break:break-all}
</style></style></style></style></style></style></style></style></style></style></style>gr</style></style></style></style></style></style></style></style></style></style></style>gr<ab</stylph</style></style></style></style></style><div class="col"><div class="col-label">KaTeX</div><div class="kt" id="fraction"></div></div></div><div class="code">\frac{x}{y}</div></div>
<div class="card"><h3>sqrt</h3><div class="row"><div class="col"><div class="col-label">AlphaEqt</div><img src="sqrt.png"></div><div class="col"><div class="col-label">KaTeX</div><div class="kt" id="sqrt"></div></div></div><div class="code">\sqrt{x+1}</div></div>
<div class="card"><h3>supsub</h3><div class="row"><div class="col"><div class="col-label">AlphaEqt</div><img src="supsub.png"></div><div class="col"><div class="col-label">KaTeX</div><div class="kt" id="supsub"></div></div></div><div class="code">x_i^2</div></div>
<div class="card"><h3>sum-limits</h3><div class="row"><div class="col"><div class="col-label">AlphaEqt</div><img src="sum-limits.png"></div><div class="col"><div class="col-label">KaTeX</div><div class="kt" id="sum-limits"></div></div></div><div class="code">\sum_{i=0}^\infty \frac{1}{i}</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script>
var katexCases={
  'fraction':'\\frac{x}{y}',
  'sqrt':'\\sqrt{x+1}',
  'supsub':'x_i^2',
  'sum-limits':'\\displaystyle\\sum_{i=0}^\\infty \\frac{1}{i}'
};
Object.keys(katexCases).forEach(function(id){
  try{katex.render(katexCases[id],document.getElementById(id),{displayMode:true,throwOnError:false})}
  catch(e){document.getElementById(id).textContent='⚠ '+e.message}
});
</script></body></html>
