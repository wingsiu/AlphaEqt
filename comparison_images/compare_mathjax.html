<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlphaEqt vs MathJax v4 - STIX2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;font-family:-apple-system,sans-serif;padding:16px 8px;color:#ccc}
h1{text-align:center;font-size:16px;color:#fff;margin-bottom:2px}
.subtitle{text-align:center;color:#888;font-size:10px;margin-bottom:10px}
.note{background:#2a4a2a;color:#8f8;padding:6px 12px;text-align:center;font-size:10px;margin-bottom:10px;border-radius:4px}
.grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.card{background:#252525;border-radius:4px;overflow:hidden;width:fit-content}
.card-header{padding:3px 8px;background:#333;font-size:9px;display:flex;justify-content:space-between}
.card-label{color:#ddd;font-weight:600}
.card-latex{color:#888;font-family:monospace;font-size:8px}
.panes{display:flex;background:#fff;align-items:flex-end}
.pane{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0;min-width:0}
.pane:first-child{border-right:2px solid #ddd}
.pane-label{font-size:7px;font-weight:600;text-transform:uppercase;color:#888;margin-bottom:1px}
.pane-label.a{color:#09f}.pane-label.m{color:#f90}
.pane img{display:block;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;background:white;align-self:flex-end;margin:0;padding:0}
.pane mjx-container{font-size:30px !important;line-height:1 !important;margin:0 !important;padding:0 !important;color:#000 !important;align-self:flex-end}
.pane mjx-container mjx-math{margin:0 !important;padding:0 !important;color:#000 !important}
.pane mjx-container[jax=CHTML][display=true]{margin:0 !important}
.pane mjx-container *{outline:1px solid rgba(255,0,0,.35);color:#000 !important}
.summary{text-align:center;margin-top:12px;font-size:10px;color:#888}
</style>
</head>
<body>
<h1>AlphaEqt (STIX2 Math OTF) vs MathJax v4 (STIX2)</h1>
<p class="subtitle">AlphaEqt: 30pt @ 2× retina PNG | MathJax v4: 30px CHTML + mathjax-stix2</p>
<div class="note">Both use STIX2 font family - metrics should match</div>
<div class="grid" id="grid"></div>
<div class="summary" id="status">Loading MathJax v4...</div>

<script>
var compareConfig = { logicalFontSize: 30, pixelScale: 2 };

function scaleAlphaImg(img) {
  var s = compareConfig.pixelScale || 1;
  img.style.width = (img.naturalWidth / s) + 'px';
  img.style.height = (img.naturalHeight / s) + 'px';
}

function attachAlphaImg(img) {
  img.addEventListener('load', function() { scaleAlphaImg(img); });
  if (img.complete) scaleAlphaImg(img);
}

MathJax={tex:{inlineMath:[],displayMath:[['$$','$$']]},chtml:{display:true,font:'mathjax-stix2',mathmlSpacing:false,exFactor:12},startup:{typeset:false}};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml-nofont.js"></script>
<script>
fetch('compare-config.json').then(function(r){ return r.ok ? r.json() : compareConfig; })
.catch(function(){ return compareConfig; })
.then(function(cfg){
  compareConfig = cfg;
  return MathJax.startup.promise;
}).then(function(){
  document.getElementById('status').textContent='MathJax v4 + mathjax-stix2 loaded';
  var g=document.getElementById('grid');
  [["fraction","\\frac{x}{y}"],["nested-frac","\\frac{\\frac{a}{b}}{\\frac{c}{d}}"],
   ["sqrt","\\sqrt{x+1}"],["sqrt-nested","\\sqrt{\\frac{x}{y}}"],
   ["sup","x^{2}"],["sub","x_{1}"],["supsub","x_{i}^{2}"],
   ["sum-display","\\sum_{i=0}^{n} i^{2}"],["sum-inline","\\textstyle\\sum_{i=0}^{n} i^{2}"],
   ["integral","\\int_{0}^{\\infty} f(x)\\,dx"],
   ["matrix","\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}"],
   ["leftright","\\left(\\frac{x}{y}\\right)"],
   ["accent-hat","\\hat{x}"],["accent-vec","\\vec{x}"],["accent-bar","\\bar{x}"],
   ["accent-bar-multi","\\bar{ab}"],["accent-widehat","\\widehat{AB}"],
   ["accent-tilde","\\tilde{x}"],["accent-dot","\\dot{x}"],["accent-ddot","\\ddot{x}"],
   ["color","\\textcolor{red}{x}"],["colorbox","\\colorbox{yellow}{x+y}"],
   ["frac-display","\\dfrac{1}{2}"],["frac-text","\\tfrac{1}{2}"],
   ["sqrt-3","\\sqrt[3]{x}"],["greek","\\alpha\\beta\\gamma\\omega"],
   ["sin-cos","\\sin^{2}\\theta + \\cos^{2}\\theta"],
   ["sum-limits","\\sum_{i=0}^{\\infty} \\frac{1}{i}"],
   ["text","\\text{Hello world}"],
   ["complex-frac1","\\frac{a}{b+\\frac{c}{d+\\frac{5}{y-\\frac{x^2}{3}}}}"],
   ["complex-int","\\sqrt[3]{a+\\frac{3}{x^2}}\\int_0^1\\frac{{\\int y}^3+\\frac{x}{5}-1}{x^4-4\\sqrt[3]{x}+\\frac{\\frac{3+x}{4-y}}{\\frac{3+x}{\\sqrt{c^2}+y}}}= \\int_0^1 a \\cos x \\text{😃}dx"],
   ["complex-mix","12x3^{\\int 2}+\\frac{\\int a}{b}-\\sqrt[n]{x+y^2-\\frac{\\frac{z}{1-7v^2}}{\\frac{3r^3}{\\frac 1{2+\\frac xy}}}}+\\int_0^1 \\sum aa+3a"]
  ].forEach(function(pair){
    var label=pair[0], latex=pair[1];
    var c=document.createElement('div');c.className='card';
    c.innerHTML='<div class="card-header"><span class="card-label">'+label+'</span><span class="card-latex">'+latex+'</span></div>'+
      '<div class="panes"><div class="pane"><div class="pane-label a">AlphaEqt</div><img class="alpha-img" src="'+label+'.png"></div>'+
      '<div class="pane"><div class="pane-label m">MathJax</div><div id="mj-'+label+'"></div></div></div>';
    g.appendChild(c);
    attachAlphaImg(c.querySelector('.alpha-img'));
    document.getElementById('mj-'+label).textContent='$$'+latex+'$$';
  });
  MathJax.typesetPromise().then(function(){
    document.getElementById('status').textContent='32 expressions - AlphaEqt vs MathJax v4 (STIX2)';
  });
});
</script>
</body>
</html>
