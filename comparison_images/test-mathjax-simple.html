<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>MathJax Simple Test</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script>
MathJax = {
  chtml: { fontFamily: "xits", scale: 1, minScale: 1 },
  tex: { displayMath: [['\\[','\\]']] }
};
</script>
</head><body style="background:#1a1a2e;color:#eee;font-family:system-ui;margin:20px">
<h1 style="color:#e94560">MathJax Test</h1>
<div style="background:#fff;padding:12px;border-radius:4px;color:#000;font-size:50px">\[x + y\]</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    var el = document.querySelector('body');
    if (el.innerHTML.indexOf('mjx-container') === -1) {
      el.innerHTML += '<p style="color:red">MathJax failed to load/init</p>';
    }
  }, 3000);
});
</script>
</body></html>
