<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>MathJax+XITS Test</title>
<style>
@font-face {
  font-family: "XITSMathTest";
  src: url("xits-math-comparison.otf") format("opentype");
}
body{font-family:system-ui;background:#1a1a2e;color:#eee;margin:20px}
h1{color:#e94560}
.math{background:#fff;border-radius:4px;padding:12px;min-height:30px;color:#000}
</style>
<script>
MathJax = {
  chtml: {
    fontURL: '',
    adaptiveCSS: false,
    matchFontHeight: false,
    scale: 1
  },
  tex: { displayMath: [['\\[','\\]']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head><body>
<h1>MathJax + XITS via @font-face</h1>
<div class="math">\[x + y\]</div>
<script>
MathJax.startup.promise.then(function() {
  var s = document.createElement('style');
  s.textContent = 'mjx-container[jax="CHTML"] * { font-family: "XITSMathTest", math, serif !important; }';
  document.head.appendChild(s);
});
</script>
</body></html>
